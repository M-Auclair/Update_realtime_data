name: Update Realtime Water Level Data

on:
  schedule:
    # Run daily at 8:00 AM Mountain time 
    # For 9am Mountain Time (UTC-7), use: cron: '0 16 * * *'
    # For 9am Eastern Time (UTC-5), use: cron: '0 14 * * *'
    - cron: '0 15 * * *'  # 8:00 AM MT daily
  workflow_dispatch:  # Allows manual triggering from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch all history for proper git operations
    
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.0'  # Adjust to your R version
    
    - name: Install R dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        packages: |
          tidyhydat
          dplyr
          lubridate
        needs: |
          checkout
          setup-r
    
    - name: Run data update script
      run: |
        Rscript scripts/update_realtime_data.R
      env:
        TZ: UTC
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/realtime_WL_data.rds
        git diff --staged --quiet || (git commit -m "Auto-update: Realtime water level data $(date +'%Y-%m-%d %H:%M:%S UTC')" && git push)